<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<style>
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(8px);

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-content{

    width:380px;

    background:#0f172a;

    border:1px solid rgba(255,255,255,.1);

    border-radius:20px;

    padding:30px;

    text-align:center;

    box-shadow:
    0 0 40px rgba(139,92,246,.25);
}

.success-icon{

    width:70px;
    height:70px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:35px;

    color:white;

    background:
    linear-gradient(
        135deg,
        #8b5cf6,
        #ec4899
    );
}

.modal-content h2{

    margin-top:20px;
    margin-bottom:20px;

    color:white;
}

#successDetails{

    color:#cbd5e1;

    line-height:2;
    margin-bottom:25px;
}

#closeModal{

    width:100%;

    height:50px;

    border:none;

    border-radius:12px;

    color:white;

    font-weight:700;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#43286f 0%,transparent 25%),
    radial-gradient(circle at bottom right,#61204b 0%,transparent 25%),
    #020817;

    color:white;
}

.card{
    width:430px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border-radius:20px;

    padding:30px;

box-shadow:
0 0 40px rgba(139,92,246,.15),
0 8px 30px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    font-size:34px;
    font-weight:700;
}

p{
    text-align:center;
    color:#94a3b8;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    margin-top:15px;
    color:#e2e8f0;
    font-size:14px;
}

input,
select{
    width:100%;

    height:52px;

    border:none;

    border-radius:12px;

    padding:0 15px;

    background:#f1f5f9;

    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
}

button{
    width:100%;

    margin-top:25px;

    height:55px;

    border:none;

    border-radius:12px;

    font-weight:700;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}
button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

#loading{
    text-align:center;
    margin-top:15px;
    color:#c084fc;
    font-weight:600;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#64748b;
    font-size:12px;
}
#closeModal{
    width:100%;
    height:50px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:700;
    cursor:pointer !important;
    pointer-events:auto !important;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
}
</style>
</head>
<body>

<div class="card">

<h1>Create your account</h1>
<p>Join us in less than a minute.</p>

    <form id="registerForm">

        <label>Platform</label>

        <select id="site">

            <option value="mvpph">
                MVPPH
            </option>

            <option value="87game">
                87Game
            </option>

        </select>

<label>Username</label>
<input
    type="text"
    id="username"
    required
>

<label>Mobile Number This Will be Used For OTP</label>
<input
    type="text"
    id="mobile"
    inputmode="numeric"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    required
    maxlength="11"
    placeholder="09123456789"
>

<label>Password</label>
<input
    type="password"
    id="password"
    required
>

<label>Confirm Password</label>
<input
    type="password"
    id="confirm"
    required
>

<button type="submit">
    ✨ Create Account
</button>

<div id="loading" style="display:none;">
    🔄 Creating account...
</div>
    </form>
<div class="footer">
    By creating an account, you agree to our Terms and Privacy Policy.
</div>
</div>

<script>

document.getElementById("registerForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const mobile = document.getElementById("mobile").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (!username || !mobile || !password || !confirm) {
        alert("Please fill in all fields.");
        return;
    }

    if (!/^\d+$/.test(mobile)) {
        alert("Mobile number must contain numbers only.");
        return;
    }

    if (mobile.length !== 10 && mobile.length !== 11) {
        alert("Mobile number must be 10 or 11 digits.");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match.");
        return;
    }

    const payload = {
        site: document.getElementById("site").value,
        username,
        mobile,
        password
    };
const submitBtn =
    document.querySelector("button[type='submit']");

submitBtn.disabled = true;
submitBtn.innerHTML = "🔄 Creating Account...";

document.getElementById("loading").style.display = "block";
    try {

        const response = await fetch(
            "http://account-creation-production-3c5b.up.railway.app/register",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            }
        );

        const result = await response.json();

if(result.success){


    localStorage.setItem(
        "authToken",
        result.token
    );

    localStorage.setItem(
        "mobile",
        result.mobile
    );

    localStorage.setItem(
        "username",
        result.username
    );
	
submitBtn.disabled = false;
submitBtn.innerHTML = "✨ Create Account";
document.getElementById("successDetails").innerHTML = `
    <b>Username:</b> ${result.username}<br>
    <b>Password:</b> ${result.password}<br>
    <b>Mobile:</b> ${result.mobile}
`;

await fetch(
    "http://account-creation-production-3c5b.up.railway.app/send-otp",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            mobile: result.mobile,
            token: result.token
        })
    }
);

document.getElementById("successModal").style.display = "flex";

    document.getElementById("registerForm").reset();
	document.getElementById("loading").style.display = "none";

} else {

    submitBtn.disabled = false;
    submitBtn.innerHTML = "✨ Create Account";

    document.getElementById("loading").style.display = "none";

    alert(result.error || "Registration failed");

}

    } catch(err){

    document.getElementById("loading").style.display = "none";

    submitBtn.disabled = false;
    submitBtn.innerHTML = "✨ Create Account";

    console.error(err);

    alert("Backend connection failed");

}

});
window.onload = () => {

    document
    .getElementById("closeModal")
    .addEventListener("click", () => {

        window.location.href = "otp.html";

    });

};

</script>
<div id="successModal" class="modal">

    <div class="modal-content">

        <div class="success-icon">✓</div>

        <h2>Account Created!</h2>

        <div id="successDetails"></div>

<button
    id="closeModal"
    type="button">
    Continue
</button>

    </div>

</div>
</body>
</html>
