<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register User</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#43286f 0%,transparent 25%),
    radial-gradient(circle at bottom right,#61204b 0%,transparent 25%),
    #020817;
}

.card{
    width:430px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border-radius:20px;

    padding:30px;

    box-shadow:
    0 0 40px rgba(139,92,246,.15),
    0 8px 30px rgba(0,0,0,.35);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

input{
    width:100%;
    height:52px;

    border:none;
    border-radius:12px;

    padding:0 15px;

    background:#f1f5f9;

    margin-top:15px;
}

button{
    width:100%;
    height:55px;

    border:none;
    border-radius:12px;

    margin-top:20px;

    color:white;
    font-weight:700;
    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    color:#c084fc;
    text-decoration:none;
}

</style>
</head>
<body>

<div class="card">

    <h1>Create Account</h1>

    <p>
        Create your website account
    </p>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <div class="link">
        Already have an account?
        <a href="login.html">
            Login
        </a>
    </div>

</div>

<script>

document
.getElementById("registerForm")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const response = await fetch(
        "https://account-creation-production-3c5b.up.railway.app/register-user",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username:
                    document.getElementById("username").value,

                password:
                    document.getElementById("password").value
            })
        }
    );

    const result =
        await response.json();

    if(result.success){

        alert("Account Created");

        window.location.href =
            "login.html";

    }else{

        alert(result.error);

    }

});

</script>

</body>
</html>
