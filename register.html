<h1>Create Account</h1>

<form id="registerForm">

  <input
    type="text"
    id="username"
    placeholder="Username"
    required
  >

  <input
    type="text"
    id="mobile"
    placeholder="Mobile Number"
    required
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <input
    type="password"
    id="confirmPassword"
    placeholder="Confirm Password"
    required
  >

  <button type="submit">
    Create Account
  </button>

</form>
