<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#43286f 0%,transparent 25%),
    radial-gradient(circle at bottom right,#61204b 0%,transparent 25%),
    #020817;
}

.card{
    width:430px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;

    box-shadow:
    0 0 40px rgba(139,92,246,.15),
    0 8px 30px rgba(0,0,0,.35);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
}

input{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    padding:0 15px;
    background:#f1f5f9;
    font-size:16px;
}

button{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
}

button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

#loading{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#c084fc;
    font-weight:600;
}

#success{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#22c55e;
    font-weight:600;
}
</style>

</head>
<body>

<div class="card">

    <h1>OTP Verification</h1>

    <p>
        Enter the verification code sent to your mobile number.
    </p>

    <form id="otpForm">

        <label>Mobile Number</label>

        <input
            type="text"
            id="mobile"
            maxlength="11"
            readonly
            required
        >

        <label>OTP Code</label>

        <input
            type="text"
            id="otp"
            placeholder="Enter OTP"
            maxlength="6"
            required
        >

        <button type="submit" id="verifyBtn">
            Verify OTP
        </button>
		<button
    type="button"
    id="resendBtn"
    disabled>
    Resend OTP (180s)
</button>

        <div id="loading">
            🔄 Verifying OTP...
        </div>

        <div id="success">
            ✅ OTP Verified Successfully
        </div>

    </form>

</div>



<script>

let countdown = 180;
let countdownTimer;

const resendBtn =
    document.getElementById("resendBtn");

function startCountdown() {

    clearInterval(countdownTimer);

    resendBtn.disabled = true;

    countdown = 180;

    countdownTimer = setInterval(() => {

        resendBtn.innerHTML =
            `Resend OTP (${countdown}s)`;

        countdown--;

        if(countdown < 0){

            clearInterval(countdownTimer);

            resendBtn.disabled = false;

            resendBtn.innerHTML =
                "Resend OTP";

        }

    }, 1000);

}

const savedMobile = localStorage.getItem("mobile");

if(savedMobile){
    document.getElementById("mobile").value = savedMobile;
}
startCountdown();

document
.getElementById("otpForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const mobile =
        document.getElementById("mobile").value.trim();

    const otp =
        document.getElementById("otp").value.trim();

    const btn =
        document.getElementById("verifyBtn");

    btn.disabled = true;
    btn.innerHTML = "🔄 Verifying...";

    document.getElementById("loading").style.display = "block";

try {

    const response = await fetch(
        "http://account-creation-production-3c5b.up.railway.app/verify-otp",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                site: localStorage.getItem("site"),
                mobile,
                otp,
                token: localStorage.getItem("authToken")
            })
        }
    );

    const result = await response.json();

    console.log("VERIFY RESULT:", result);

if (result.success === true) {

    await fetch(
        "http://account-creation-production-3c5b.up.railway.app/save-account",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":
                    localStorage.getItem("jwt")
            },
body:JSON.stringify({
    site:
        localStorage.getItem("site"),

    username:
        localStorage.getItem("createdUsername"),

    mobile:
        localStorage.getItem("mobile"),

    password:
        localStorage.getItem("createdPassword")
})
        }
    );

    document.getElementById("loading").style.display = "none";

    btn.disabled = false;
    btn.innerHTML = "Verify OTP";

    document.getElementById("success").style.display = "block";

    document.getElementById("success").innerHTML =
        "✅ OTP Verified Successfully";

    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 2000);

} else {

    alert(
        result.message ||
        result.error ||
        "❌ Invalid OTP"
    );

}

} catch (err) {

    console.error(err);

    alert("❌ Verification Failed");

}

document.getElementById("loading").style.display = "none";

btn.disabled = false;
btn.innerHTML = "Verify OTP";

});
resendBtn.addEventListener(
    "click",
    async () => {

        resendBtn.disabled = true;
        resendBtn.innerHTML =
            "🔄 Sending OTP...";

        try{

            const response = await fetch(
                "http://account-creation-production-3c5b.up.railway.app/send-otp",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
body:JSON.stringify({
    site:
        localStorage.getItem("site"),

    mobile:
        localStorage.getItem("mobile"),

    token:
        localStorage.getItem("authToken")
})
                }
            );

            const result =
                await response.json();

            if(result.success){

                alert(
                    "OTP resent successfully"
                );

                startCountdown();

            }else{

                resendBtn.disabled = false;
                resendBtn.innerHTML =
                    "Resend OTP";

                alert(
                    result.error ||
                    "Failed to resend OTP"
                );

            }

        }catch(err){

            console.error(err);

            resendBtn.disabled = false;
            resendBtn.innerHTML =
                "Resend OTP";

            alert(
                "Failed to resend OTP"
            );

        }

    }
);
</script>

</body>
</html>
