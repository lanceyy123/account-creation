<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#43286f 0%,transparent 25%),
    radial-gradient(circle at bottom right,#61204b 0%,transparent 25%),
    #020817;
}

.card{
    width:430px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:30px;

    box-shadow:
    0 0 40px rgba(139,92,246,.15),
    0 8px 30px rgba(0,0,0,.35);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
}

input{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    padding:0 15px;
    background:#f1f5f9;
    font-size:16px;
}

button{
    width:100%;
    height:55px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;

    background:
    linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
}

button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

#loading{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#c084fc;
    font-weight:600;
}

#success{
    display:none;
    text-align:center;
    margin-top:15px;
    color:#22c55e;
    font-weight:600;
}
</style>

</head>
<body>

<div class="card">

    <h1>OTP Verification</h1>

    <p>
        Enter the verification code sent to your mobile number.
    </p>

    <form id="otpForm">

        <label>Mobile Number</label>

        <input
            type="text"
            id="mobile"
            maxlength="11"
            readonly
            required
        >

        <label>OTP Code</label>

        <input
            type="text"
            id="otp"
            placeholder="Enter OTP"
            maxlength="6"
            required
        >

        <button type="submit" id="verifyBtn">
            Verify OTP
        </button>
		<button
    type="button"
    id="resendBtn"
    disabled>
    Resend OTP (180s)
</button>

        <div id="loading">
            🔄 Verifying OTP...
        </div>

        <div id="success">
            ✅ OTP Verified Successfully
        </div>

    </form>

</div>



<script>
function showModal(
    title,
    message,
    success = true
){

    document.getElementById(
        "modalTitle"
    ).innerText = title;

    document.getElementById(
        "modalMessage"
    ).innerText = message;

    const icon =
        document.getElementById(
            "modalIcon"
        );

    icon.innerHTML =
        success ? "✓" : "✕";

    icon.style.background =
        success
        ? "linear-gradient(135deg,#22c55e,#16a34a)"
        : "linear-gradient(135deg,#ef4444,#dc2626)";

    document.getElementById(
        "messageModal"
    ).style.display = "flex";
}


let countdown = 180;
let countdownTimer;

const resendBtn =
    document.getElementById("resendBtn");

function startCountdown() {

    clearInterval(countdownTimer);

    resendBtn.disabled = true;

    countdown = 180;

    countdownTimer = setInterval(() => {

        resendBtn.innerHTML =
            `Resend OTP (${countdown}s)`;

        countdown--;

        if(countdown < 0){

            clearInterval(countdownTimer);

            resendBtn.disabled = false;

            resendBtn.innerHTML =
                "Resend OTP";

        }

    }, 1000);

}

const savedMobile = localStorage.getItem("mobile");

if(savedMobile){
    document.getElementById("mobile").value = savedMobile;
}
startCountdown();

document
.getElementById("otpForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const mobile =
        document.getElementById("mobile").value.trim();

    const otp =
        document.getElementById("otp").value.trim();

    const btn =
        document.getElementById("verifyBtn");

    btn.disabled = true;
    btn.innerHTML = "🔄 Verifying...";

    document.getElementById("loading").style.display = "block";

try {

    const response = await fetch(
        "https://account-creation-production-3c5b.up.railway.app/verify-otp",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                site: localStorage.getItem("site"),
                mobile,
                otp,
                token: localStorage.getItem("authToken")
            })
        }
    );

    const result = await response.json();

    console.log("VERIFY RESULT:", result);

if (result.success === true) {
const jwtToken =
    localStorage.getItem("jwt");

if(jwtToken){

    await fetch(
        "https://account-creation-production-3c5b.up.railway.app/save-account",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization": jwtToken
            },
            body: JSON.stringify({
                site: localStorage.getItem("site"),
                username: localStorage.getItem("createdUsername"),
                mobile: localStorage.getItem("mobile"),
                password: localStorage.getItem("createdPassword")
            })
        }
    );

}

document.getElementById("loading").style.display = "none";

btn.disabled = false;
btn.innerHTML = "Verify OTP";

document.body.insertAdjacentHTML(
    "beforeend",
    `
    <div id="successModal" style="
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.7);
        backdrop-filter:blur(8px);
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:99999;
    ">
        <div style="
            width:380px;
            background:#0f172a;
            border:1px solid rgba(255,255,255,.1);
            border-radius:20px;
            padding:30px;
            text-align:center;
            box-shadow:0 0 40px rgba(139,92,246,.25);
        ">
            <div style="
                width:70px;
                height:70px;
                margin:auto;
                border-radius:50%;
                display:flex;
                align-items:center;
                justify-content:center;
                font-size:35px;
                color:white;
                background:linear-gradient(
                    135deg,
                    #8b5cf6,
                    #ec4899
                );
            ">
                ✓
            </div>

            <h2 style="
                color:white;
                margin-top:20px;
            ">
                OTP Verified
            </h2>

            <p style="
                color:#cbd5e1;
                margin-top:15px;
                line-height:1.8;
            ">
               Your account has been verified successfully.
            </p>

            <button id="continueBtn" style="
                width:100%;
                height:50px;
                border:none;
                border-radius:12px;
                margin-top:20px;
                color:white;
                font-weight:700;
                cursor:pointer;
                background:linear-gradient(
                    90deg,
                    #8b5cf6,
                    #ec4899
                );
            ">
                Continue
            </button>
        </div>
    </div>
    `
);

document
.getElementById("continueBtn")
.addEventListener("click", () => {

    window.location.href =
        "dashboard.html";

});

} else {

    showModal(
    "Invalid OTP",
    result.message ||
    result.error ||
    "The OTP code is invalid.",
    false
);

}

} catch (err) {

    console.error(err);

    showModal(
    "Verification Failed",
    "Unable to verify OTP.",
    false
);

}

document.getElementById("loading").style.display = "none";

btn.disabled = false;
btn.innerHTML = "Verify OTP";

});
resendBtn.addEventListener(
    "click",
    async () => {

        resendBtn.disabled = true;
        resendBtn.innerHTML =
            "🔄 Sending OTP...";

        try{

            const response = await fetch(
                "https://account-creation-production-3c5b.up.railway.app/send-otp",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
body:JSON.stringify({
    site:
        localStorage.getItem("site"),

    mobile:
        localStorage.getItem("mobile"),

    token:
        localStorage.getItem("authToken")
})
                }
            );

            const result =
                await response.json();

            if(result.success){

                showModal(
    "OTP Sent",
    "A new OTP has been sent to your mobile number.",
    true
);

                startCountdown();

            }else{

                resendBtn.disabled = false;
                resendBtn.innerHTML =
                    "Resend OTP";

                showModal(
    "Resend Failed",
    result.error ||
    "Failed to resend OTP.",
    false
);

            }

        }catch(err){

            console.error(err);

            resendBtn.disabled = false;
            resendBtn.innerHTML =
                "Resend OTP";

            showModal(
    "Resend Failed",
    "Failed to resend OTP.",
    false
);

        }

    }
);
window.addEventListener("DOMContentLoaded", () => {

    document
    .getElementById("modalBtn")
    .addEventListener(
        "click",
        () => {

            document.getElementById(
                "messageModal"
            ).style.display = "none";

        }
    );

});
</script>
<div id="messageModal" class="modal" style="display:none;">
    <div class="modal-content">

        <div id="modalIcon" class="success-icon">
            ✓
        </div>

        <h2 id="modalTitle">
            Success
        </h2>

        <div id="modalMessage"
             style="
             color:#cbd5e1;
             line-height:1.8;
             margin-bottom:20px;">
        </div>

        <button
            id="modalBtn"
            type="button">
            OK
        </button>

    </div>
</div>
</body>
</html>
